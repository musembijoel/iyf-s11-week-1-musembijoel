<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>

    <h1>Contact Us</h1>

    <form action="/my-handling-form-page" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Full Name:</label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required>
            <br><br>

            <label for="email">Email:</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required>
            <br><br>

            <label for="phone">Phone:</label>
            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Enter your phone number">
        </fieldset>

        <br><br>

        <fieldset>
            <legend>Message Details</legend>

            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="">-- Select a Subject --</option>
                <option value="general">General Inquiry</option>
                <option value="support">Support</option>
                <option value="feedback">Feedback</option>
            </select>
            <br><br>

            <label for="message">Message:</label><br>
            <textarea
                id="message"
                name="message"
                minlength="50"
                placeholder="Enter your message (minimum 50 characters)"
                required>
            </textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Subscription</legend>

            <input
                type="checkbox"
                id="newsletter"
                name="newsletter">

            <label for="newsletter">
                Subscribe to Newsletter
            </label>
        </fieldset>

        <br>

        <button type="submit">Submit</button>

    </form>
    <p><strong>Time:</strong> 9:00 AM - 5:00 PM, Monday - Friday</p>
    <p><strong>Location:</strong>Mirema drive, Nairobi</p>
    <a href="https://www.instagram.com" target="_blank" rel="joemusa">Instagram</a>
    <a href="https://www.facebook.com" target="_blank" rel="joemusa">Facebook</a>
</body>
</html>
